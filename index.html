<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Gacha</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #1f1f1f; color: #FFF; font-family: Courier, monospace; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 1024px; margin: auto; }
        #result { font-size: 24px; margin-top: 20px; min-height: 40px; }
        #header { font-size: 20px; margin-top: 10px; }
        #description { font-size: 15px; margin-top: 10px; min-height: 80px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { background: #111; color: #FFF; border: 1px solid #646464; padding: 10px 20px; font-family: Courier, monospace; cursor: pointer; }
        button.active { color: #11d939; }
        .roll-btn { font-size: 30px; padding: 15px 40px; margin-top: 30px; }
        .stats { margin-top: 20px; }
        input { width: 50px; background: #212121; color: #FFF; border: 1px solid #646464; text-align: center; font-family: Courier, monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div id="header">-</div>
        <div id="result">Result will appear here</div>
        <div id="description">Description will appear here</div>

        <button class="roll-btn" id="rollBtn">Roll</button>

        <div class="stats">
            <label>Min: <input type="number" id="minVal" step="0.1" readonly></label>
            <label>Avg: <input type="number" id="avgVal" step="0.1" readonly></label>
            <label>Max: <input type="number" id="maxVal" step="0.1" readonly></label>
        </div>

        <div class="controls">
            <div class="btn-group" id="categories"></div>
            <div class="btn-group" id="presets"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
